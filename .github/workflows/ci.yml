name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist/
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # MV3 extension service workers do not reliably wake in Playwright
      # headless mode, so the suite runs headed under xvfb.
      - name: E2E tests
        run: xvfb-run --auto-servernum npm run e2e
